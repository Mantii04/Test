name: Crave CI Test

on:
  workflow_dispatch:

jobs:
  crave-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # IMPORTANT: system dependencies fix
      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl git

      # Install correct Crave binary
      - name: Install Crave
        run: |
          curl -L -o crave https://github.com/accupara/crave/releases/download/0.2-7220/crave-0.2-7220-linux-amd64.bin
          chmod +x crave
          sudo mv crave /usr/local/bin/

      # Debug binary environment
      - name: Debug environment
        run: |
          which crave
          file /usr/local/bin/crave
          ldd /usr/local/bin/crave || true

      # Version test (now safer)
      - name: Test version
        run: |
          export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
          crave version || (echo "Crave failed to start" && exit 1)

      # Load config
      - name: Setup config
        run: |
          mkdir -p ~/.crave
          echo "${{ secrets.CRAVE_CONF }}" > ~/.crave/crave.conf

      # Safe command test
      - name: Test list
        run: |
          export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
          crave -c ~/.crave/crave.conf list || true